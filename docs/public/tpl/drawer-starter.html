<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrembem - Drawer starter template</title>
    <link rel="stylesheet" href="https://unpkg.com/vrembem@next/dist/index.css" />
    <script type="module">
      import { DrawerCollection, focusTrap, mediaQuery, propStore } from "https://unpkg.com/vrembem@next/dist/index.js";
      
      const drawers = new DrawerCollection({
        plugins: [focusTrap(), mediaQuery(), propStore()]
      });

      await drawers.mount();
    </script>
  </head>
  <body>

    <div class="drawer-frame">

      <!-- Drawer -->
      <aside id="drawer-sidebar" data-breakpoint="lg" class="drawer">
        <div class="drawer__dialog dialog" role="dialog">
          <div class="drawer__container">
            <div class="dialog__header">
              <h2 class="dialog__title">Drawer Title</h2>
              <button class="link" data-drawer-close type="button">Close</button>
            </div>
            <div class="dialog__body spacing">
              <p>This is an example implementation of a drawer component.</p>
              <h3>Plugins</h3>
              <ul class="list">
                <li>focusTrap</li>
                <li>mediaQuery</li>
                <li>propStore</li>
              </ul>
            </div>
            <div class="dialog__footer">
              Drawer footer goes here...
            </div>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <div class="drawer-main">
        <div class="section" style="min-height: 100vh;">
          <div class="section__container content spacing text-align-center">
            <h1>Hello World</h1>
            <p>A drawer based starter template powered by Vrembem via CDN.</p>
            <div class="flex justify-content-center foreground-subtle margin-bottom-lg">
              <a class="link" href="https://vrembem.com/">Docs</a>
              <span>/</span>
              <a class="link" href="https://github.com/sebnitu/vrembem">GitHub</a>
            </div>
            <button class="button" data-drawer-toggle="drawer-sidebar" type="button">Toggle drawer</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
