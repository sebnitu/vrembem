<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%VITE_NAME%</title>
  <link rel="icon" type="image/png" href="https://sebnitu.com/icons/vb-favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://sebnitu.com/icons/vb-favicon.svg">
  <script type="module">
    import "vrembem/sass";

    customElements.define("vb-menu", class extends HTMLElement {
      connectedCallback() {
        this.innerHTML = `
          <ul class="menu">
            <li class="menu__item">
              <button type="button" class="menu__action">
                <span class="flex-grow">Undo</span>
                <span class="foreground-subtle">⌘Z</span>
              </button>
            </li>
            <li class="menu__item">
              <button type="button" class="menu__action">
                <span class="flex-grow">Redo</span>
                <span class="foreground-subtle">&uarr;⌘Z</span>
              </button>
            </li>
            <li class="menu__sep"></li>
            <li class="menu__item">
              <button type="button" class="menu__action">
                <span class="flex-grow">Cut</span>
                <span class="foreground-subtle">⌘X</span>
              </button>
            </li>
            <li class="menu__item">
              <button type="button" class="menu__action">
                <span class="flex-grow">Copy</span>
                <span class="foreground-subtle">⌘C</span>
              </button>
            </li>
            <li class="menu__item">
              <button type="button" class="menu__action">
                <span class="flex-grow">Paste</span>
                <span class="foreground-subtle">⌘V</span>
              </button>
            </li>
          </ul>
        `;
      }
    });
  </script>
</head>
<body>

  <header class="section background-shift">
    <div class="section__container max-width-xs spacing-sm">
      <h1 class="font-size-lg">%VITE_NAME%</h1>
      <p>%VITE_DESCRIPTION%</p>
      <ol class="foreground-subtle flex margin-top list-style-none">
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%">%VITE_ROOT%</a>
        </li>
        <li class="foreground-subtle">/</li>
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%/tree/main/packages/%VITE_PACKAGE%#readme">%VITE_PACKAGE%</a>
        </li>
      </ol>
    </div>
  </header>

  <section class="section section--padding-xl">
    <div class="section__container spacing">
      <h2 id="popover" class="text-align-center"><a href="#popover">popover</a></h2>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-example">Default</button>
        <div id="popover-example" class="popover" popover>
          <vb-menu></vb-menu>
        </div>
      </div>
    </div>
  </section>

  <section class="section section--padding-xl border-top">
    <div class="section__container spacing">
      <h2 id="popover--arrow" class="text-align-center"><a href="#popover--arrow">popover--arrow</a></h2>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-arrow-1a" interestfor="popover-arrow-1b">Arrow 1</button>
        <div id="popover-arrow-1a" class="popover popover--arrow popover--pos-bottom" popover><vb-menu></vb-menu></div>
        <div id="popover-arrow-1b" class="popover popover--arrow popover--pos-top popover--tooltip" popover="hint">Tooltip</div>

        <button class="button" popovertarget="popover-arrow-2a" interestfor="popover-arrow-2b">Arrow 2</button>
        <div id="popover-arrow-2a" class="popover popover--arrow popover--pos-top" popover><vb-menu></vb-menu></div>
        <div id="popover-arrow-2b" class="popover popover--arrow popover--pos-bottom popover--tooltip" popover="hint">Tooltip</div>

        <button class="button" popovertarget="popover-arrow-3a" interestfor="popover-arrow-3b">Arrow 3</button>
        <div id="popover-arrow-3a" class="popover popover--arrow popover--pos-left" popover><vb-menu></vb-menu></div>
        <div id="popover-arrow-3b" class="popover popover--arrow popover--pos-right popover--tooltip" popover="hint">Tooltip</div>

        <button class="button" popovertarget="popover-arrow-4a" interestfor="popover-arrow-4b">Arrow 4</button>
        <div id="popover-arrow-4a" class="popover popover--arrow popover--pos-right" popover><vb-menu></vb-menu></div>
        <div id="popover-arrow-4b" class="popover popover--arrow popover--pos-left popover--tooltip" popover="hint">Tooltip</div>
      </div>
    </div>
  </section>

  <section class="section section--padding-xl border-top">
    <div class="section__container max-width-xs spacing">
      <h2 id="popover--pos" class="text-align-center"><a href="#popover--pos">popover--pos-[key]</a></h2>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-top-1">Top</button>
        <button class="button" popovertarget="popover-bottom-1">Bottom</button>
        <button class="button" popovertarget="popover-left-1">Left</button>
        <button class="button" popovertarget="popover-right-1">Right</button>
        <div id="popover-top-1" class="popover popover--pos-top" popover><vb-menu></vb-menu></div>
        <div id="popover-bottom-1" class="popover popover--pos-bottom" popover><vb-menu></vb-menu></div>
        <div id="popover-left-1" class="popover popover--pos-left" popover><vb-menu></vb-menu></div>
        <div id="popover-right-1" class="popover popover--pos-right" popover><vb-menu></vb-menu></div>
      </div>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-top-start-1">Top Start</button>
        <button class="button" popovertarget="popover-bottom-start-1">Bottom Start</button>
        <button class="button" popovertarget="popover-left-start-1">Left Start</button>
        <button class="button" popovertarget="popover-right-start-1">Right Start</button>
        <div id="popover-top-start-1" class="popover popover--pos-top-start" popover><vb-menu></vb-menu></div>
        <div id="popover-bottom-start-1" class="popover popover--pos-bottom-start" popover><vb-menu></vb-menu></div>
        <div id="popover-left-start-1" class="popover popover--pos-left-start" popover><vb-menu></vb-menu></div>
        <div id="popover-right-start-1" class="popover popover--pos-right-start" popover><vb-menu></vb-menu></div>
      </div>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-top-end-1">Top End</button>
        <button class="button" popovertarget="popover-bottom-end-1">Bottom End</button>
        <button class="button" popovertarget="popover-left-end-1">Left End</button>
        <button class="button" popovertarget="popover-right-end-1">Right End</button>
        <div id="popover-top-end-1" class="popover popover--pos-top-end" popover><vb-menu></vb-menu></div>
        <div id="popover-bottom-end-1" class="popover popover--pos-bottom-end" popover><vb-menu></vb-menu></div>
        <div id="popover-left-end-1" class="popover popover--pos-left-end" popover><vb-menu></vb-menu></div>
        <div id="popover-right-end-1" class="popover popover--pos-right-end" popover><vb-menu></vb-menu></div>
      </div>
    </div>
  </section>

  <section class="section section--padding-xl border-top">
    <div class="section__container max-width-xs spacing">
      <h2 id="popover-pos" class="text-align-center"><a href="#popover">popover--tooltip</a></h2>
      <div class="width-fit-content margin-x-auto">
        <button class="button" interestfor="popover-top-2">Top</button>
        <button class="button" interestfor="popover-bottom-2">Bottom</button>
        <button class="button" interestfor="popover-left-2">Left</button>
        <button class="button" interestfor="popover-right-2">Right</button>
        <div id="popover-top-2" class="popover popover--pos-top popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-bottom-2" class="popover popover--pos-bottom popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-left-2" class="popover popover--pos-left popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-right-2" class="popover popover--pos-right popover--tooltip" popover="hint">Tooltip</div>
      </div>
      <div class="width-fit-content margin-x-auto">
        <button class="button" interestfor="popover-top-start-2">Top Start</button>
        <button class="button" interestfor="popover-bottom-start-2">Bottom Start</button>
        <button class="button" interestfor="popover-left-start-2">Left Start</button>
        <button class="button" interestfor="popover-right-start-2">Right Start</button>
        <div id="popover-top-start-2" class="popover popover--pos-top-start popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-bottom-start-2" class="popover popover--pos-bottom-start popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-left-start-2" class="popover popover--pos-left-start popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-right-start-2" class="popover popover--pos-right-start popover--tooltip" popover="hint">Tooltip</div>
      </div>
      <div class="width-fit-content margin-x-auto">
        <button class="button" interestfor="popover-top-end-2">Top End</button>
        <button class="button" interestfor="popover-bottom-end-2">Bottom End</button>
        <button class="button" interestfor="popover-left-end-2">Left End</button>
        <button class="button" interestfor="popover-right-end-2">Right End</button>
        <div id="popover-top-end-2" class="popover popover--pos-top-end popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-bottom-end-2" class="popover popover--pos-bottom-end popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-left-end-2" class="popover popover--pos-left-end popover--tooltip" popover="hint">Tooltip</div>
        <div id="popover-right-end-2" class="popover popover--pos-right-end popover--tooltip" popover="hint">Tooltip</div>
      </div>
    </div>
  </section>

  <section class="section section--padding-xl border-top">
    <div class="section__container max-width-xs spacing">
      <h2 id="popover" class="text-align-center"><a href="#popover">popover--width-[key]</a></h2>
      <div class="width-fit-content margin-x-auto">
        <button class="button" popovertarget="popover-width-auto">Width auto</button>
        <button class="button" popovertarget="popover-width-sm">Width small</button>
        <button class="button" popovertarget="popover-width-md">Width default</button>
        <button class="button" popovertarget="popover-width-lg">Width large</button>
        <div id="popover-width-auto" class="popover popover--width-auto" popover><vb-menu></vb-menu></div>
        <div id="popover-width-sm" class="popover popover--width-sm" popover><vb-menu></vb-menu></div>
        <div id="popover-width-md" class="popover" popover><vb-menu></vb-menu></div>
        <div id="popover-width-lg" class="popover popover--width-lg" popover><vb-menu></vb-menu></div>
      </div>
    </div>
  </section>

</body>
</html>
