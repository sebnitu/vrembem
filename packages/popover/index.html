<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%VITE_NAME%</title>
  <link rel="icon" type="image/png" href="https://sebnitu.com/icons/vb-favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://sebnitu.com/icons/vb-favicon.svg">
  <script type="module">
    import "vrembem/sass";
  </script>
</head>
<body>

  <header class="section background-shift">
    <div class="section__container max-width-xs spacing-sm">
      <h1 class="font-size-lg">%VITE_NAME%</h1>
      <p>%VITE_DESCRIPTION%</p>
      <ol class="foreground-subtle flex margin-top list-style-none">
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%">%VITE_ROOT%</a>
        </li>
        <li class="foreground-subtle">/</li>
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%/tree/main/packages/%VITE_PACKAGE%#readme">%VITE_PACKAGE%</a>
        </li>
      </ol>
    </div>
  </header>

  <section class="section">
    <div class="section__container max-width-xs spacing">

      <h2 id="popover"><a href="#popover">popover</a></h2>

      <div class="grid grid--cols-5 grid--rows-5">
        <span></span>
        <button class="button" popovertarget="popover-bottom-start">Bottom Start</button>
        <button class="button" popovertarget="popover-bottom">Bottom</button>
        <button class="button" popovertarget="popover-bottom-end">Bottom End</button>
        <span></span>
        
        <button class="button" popovertarget="popover-right-start">Right Start</button>
        <span></span>
        <span></span>
        <span></span>
        <button class="button" popovertarget="popover-left-start">Left Start</button>

        <button class="button" popovertarget="popover-right">Right</button>
        <span></span>
        <span></span>
        <span></span>
        <button class="button" popovertarget="popover-left">Left</button>

        <button class="button" popovertarget="popover-right-end">Right End</button>
        <span></span>
        <span></span>
        <span></span>
        <button class="button" popovertarget="popover-left-end">Left End</button>

        <span></span>
        <button class="button" popovertarget="popover-top-start">Top Start</button>
        <button class="button" popovertarget="popover-top">Top</button>
        <button class="button" popovertarget="popover-top-end">Top End</button>
        <span></span>
      </div>

      <div class="popovers">
        <div id="popover-top" class="popover popover--pos-top popover--size-auto" popover>Top popover</div>
        <div id="popover-top-start" class="popover popover--pos-top-start popover--size-auto" popover>Top Start popover</div>
        <div id="popover-top-end" class="popover popover--pos-top-end popover--size-auto" popover>Top End popover</div>
        <div id="popover-right" class="popover popover--pos-right popover--size-auto" popover>Right popover</div>
        <div id="popover-right-start" class="popover popover--pos-right-start popover--size-auto" popover>Right Start popover</div>
        <div id="popover-right-end" class="popover popover--pos-right-end popover--size-auto" popover>Right End popover</div>
        <div id="popover-bottom" class="popover popover--pos-bottom popover--size-auto" popover>Bottom popover</div>
        <div id="popover-bottom-start" class="popover popover--pos-bottom-start popover--size-auto" popover>Bottom Start popover</div>
        <div id="popover-bottom-end" class="popover popover--pos-bottom-end popover--size-auto" popover>Bottom End popover</div>
        <div id="popover-left" class="popover popover--pos-left popover--size-auto" popover>Left popover</div>
        <div id="popover-left-start" class="popover popover--pos-left-start popover--size-auto" popover>Left Start popover</div>
        <div id="popover-left-end" class="popover popover--pos-left-end popover--size-auto" popover>Left End popover</div>
      </div>

      <h2 id="popover--tooltip"><a href="#popover--tooltip">popover--tooltip</a></h2>

      <div class="flex">
        <button class="button" aria-describedby="popover-tooltip-top">Top</button>
        <button class="button" aria-describedby="popover-tooltip-bottom">Bottom</button>
        <button class="button" aria-describedby="popover-tooltip-left">Left</button>
        <button class="button" aria-describedby="popover-tooltip-right">Right</button>
      </div>

      <div id="popover-tooltip-left" class="popover popover--tooltip" style="--vb-popover-placement: left;">
        Tooltip
        <span class="popover__arrow"></span>
      </div>
      <div id="popover-tooltip-top" class="popover popover--tooltip">
        Tooltip
        <span class="popover__arrow"></span>
      </div>
      <div id="popover-tooltip-bottom" class="popover popover--tooltip" style="--vb-popover-placement: bottom;">
        Tooltip
        <span class="popover__arrow"></span>
      </div>
      <div id="popover-tooltip-right" class="popover popover--tooltip" style="--vb-popover-placement: right;">
        Tooltip
        <span class="popover__arrow"></span>
      </div>

      <h2 id="multi-popover"><a href="#multi-popover">Multi popover</a></h2>

      <button class="button" aria-controls="popover-multi-1" aria-describedby="popover-multi-2">Multi Popover</button>

      <div id="popover-multi-1" class="popover">
        <div class="padding">Multi popovers...</div>

      <div id="popover-multi-2" class="popover popover--tooltip">

      <h2 id="popover-config"><a href="#popover-config">Popover configuration</a></h2>

      <div class="flex">

        <button class="button" aria-controls="popover-hover-2">Popover data config</button>
      </div>

      </div>
