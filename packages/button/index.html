<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>%VITE_NAME%</title>
  <link rel="icon" type="image/png" href="https://sebnitu.com/icons/vb-favicon.png">
  <link rel="icon" type="image/svg+xml" href="https://sebnitu.com/icons/vb-favicon.svg">
  <script type="module">
    import "vrembem/sass";
  </script>
</head>
<body>

  <header class="section background-shift">
    <div class="section__container max-width-xs spacing-sm">
      <h1 class="font-size-lg">%VITE_NAME%</h1>
      <p>%VITE_DESCRIPTION%</p>
      <ol class="foreground-subtle flex margin-top list-style-none">
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%">%VITE_ROOT%</a>
        </li>
        <li class="foreground-subtle">/</li>
        <li class="flex flex--gap-sm align-items-center">
          <svg class="icon icon--size-sm" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          <a class="link" target="_blank" href="https://github.com/sebnitu/%VITE_ROOT%/tree/main/packages/%VITE_PACKAGE%#readme">%VITE_PACKAGE%</a>
        </li>
      </ol>
    </div>
  </header>

  <section class="section">
    <div class="section__container max-width-xs spacing">

      <h2 id="button"><a href="#button">button</a></h2>

      <div class="flex">
        <button class="button">Button</button>
      </div>

      <h2 id="button--color-value"><a href="#button--color-value">button--color-[value]</a></h2>

      <div class="flex">
        <button class="button">Button</button>
        <button class="button button--color-primary">Primary</button>
        <button class="button button--color-secondary">Secondary</button>
        <button class="button button--color-neutral">Neutral</button>
        <button class="button button--color-important">Important</button>
      </div>

      <h2 id="is-loading"><a href="#is-loading">is-loading</a></h2>

      <div class="flex">
        <button class="button is-loading" disabled>Button</button>
        <button class="button button--color-primary is-loading" disabled>Primary</button>
        <button class="button button--color-secondary is-loading" disabled>Secondary</button>
        <button class="button button--color-neutral is-loading" disabled>Neutral</button>
        <button class="button button--color-important is-loading" disabled>Important</button>
      </div>

      <h2 id="disabled"><a href="#disabled">disabled</a></h2>

      <div class="flex">
        <button class="button" disabled>Button</button>
        <button class="button button--color-primary" disabled>Primary</button>
        <button class="button button--color-secondary" disabled>Secondary</button>
        <button class="button button--color-neutral" disabled>Neutral</button>
        <button class="button button--color-important" disabled>Important</button>
      </div>

      <h2 id="button--size-value"><a href="#button--size-value">button--size-[value]</a></h2>

      <div class="flex align-items-center">
        <button class="button button--size-sm">button--size-sm</button>
        <button class="button">Button</button>
        <button class="button button--size-lg">button--size-lg</button>
      </div>

      <h2 id="button--icon"><a href="#button--icon">button--icon</a></h2>

      <div class="flex align-items-center">
        <button class="button button--icon button--size-sm">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </button>
        <button class="button button--icon">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </button>
        <button class="button button--icon button--size-lg">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </button>
        <button class="button">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span>Button</span>
        </button>
        <button class="button">Button</button>
        <button class="button">
          <span>Button</span>
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
        </button>
      </div>

      <h2 id="button--block"><a href="#button--block">button--block</a></h2>

      <div class="flex">
        <button class="button button--block">button--block</button>
        <button class="button xs:button--block">xs:button--block</button>
        <button class="button sm:button--block">sm:button--block</button>
        <button class="button md:button--block">md:button--block</button>
        <button class="button lg:button--block">lg:button--block</button>
        <button class="button xl:button--block">xl:button--block</button>
      </div>

    </div>
  </section>

</body>
</html>
